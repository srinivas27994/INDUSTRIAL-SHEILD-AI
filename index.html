<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndustrialShield AI — ICS Cybersecurity Monitor v3.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=JetBrains+Mono:wght@300;400;500;600&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --void: #010508;
  --deep: #050e18;
  --panel: #081422;
  --card: #0c1d2e;
  --card2: #0e2238;
  --card3: #102640;
  --b-dim: rgba(0,200,255,0.07);
  --b-glow: rgba(0,200,255,0.28);
  --b-hot: rgba(255,55,55,0.5);
  --b-warn: rgba(255,185,0,0.4);
  --cyan: #00c8ff;
  --cyan-d: rgba(0,200,255,0.12);
  --cyan-g: rgba(0,200,255,0.35);
  --green: #00ff9d;
  --green-d: rgba(0,255,157,0.1);
  --green-g: rgba(0,255,157,0.3);
  --yellow: #ffbb00;
  --yellow-d: rgba(255,187,0,0.1);
  --red: #ff3535;
  --red-d: rgba(255,53,53,0.1);
  --red-g: rgba(255,53,53,0.3);
  --orange: #ff8800;
  --purple: #a855f7;
  --tp: #ddeeff;
  --ts: #6aa8c8;
  --td: #2d5570;
  --hud: 'Orbitron', monospace;
  --mono: 'JetBrains Mono', monospace;
  --body: 'Rajdhani', sans-serif;
  --r: 10px;
  --r2: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--void);color:var(--tp);font-family:var(--body);min-height:100vh;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,0.008) 2px,rgba(0,200,255,0.008) 4px);pointer-events:none;z-index:9998}

#root{position:relative;z-index:1}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--deep)}
::-webkit-scrollbar-thumb{background:var(--b-glow);border-radius:3px}

/* ── LANDING ── */
.land{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:40px 20px}
.land-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,200,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.035) 1px,transparent 1px);background-size:55px 55px;animation:gpulse 5s ease-in-out infinite}
@keyframes gpulse{0%,100%{opacity:.6}50%{opacity:1}}
.land-glow{position:absolute;top:-15%;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(0,150,255,0.08) 0%,transparent 70%);pointer-events:none}
.land-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:400px;height:400px;background:rgba(0,120,255,0.06);top:-100px;right:-80px}
.orb2{width:300px;height:300px;background:rgba(0,255,157,0.04);bottom:-80px;left:-60px}

.badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--b-glow);background:var(--cyan-d);color:var(--cyan);padding:6px 16px;border-radius:100px;font-family:var(--mono);font-size:11px;margin-bottom:28px;animation:fadein 0.6s ease}
.badge-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.land-logo{font-family:var(--hud);font-size:clamp(32px,7vw,80px);font-weight:900;line-height:1;text-align:center;margin-bottom:16px;animation:fadein 0.8s ease 0.1s both}
.logo-ind{color:var(--tp)}
.logo-shield{color:var(--cyan);text-shadow:0 0 40px rgba(0,200,255,0.5),0 0 80px rgba(0,200,255,0.2)}
.logo-ai{color:var(--green);font-size:0.45em;vertical-align:middle;margin-left:6px;text-shadow:0 0 20px rgba(0,255,157,0.5)}

.land-sub{color:var(--ts);font-size:clamp(14px,2.2vw,18px);text-align:center;max-width:580px;line-height:1.7;margin-bottom:40px;animation:fadein 0.8s ease 0.2s both}

.land-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;animation:fadein 0.8s ease 0.3s both}
.btn{padding:14px 32px;border-radius:var(--r);font-family:var(--hud);font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all 0.25s;border:none;text-transform:uppercase}
.btn-primary{background:linear-gradient(135deg,#0088ff,#00c8ff);color:#000;box-shadow:0 0 30px rgba(0,150,255,0.35)}
.btn-primary:hover{box-shadow:0 0 50px rgba(0,200,255,0.55);transform:translateY(-2px)}
.btn-secondary{background:transparent;border:1px solid var(--b-glow);color:var(--cyan)}
.btn-secondary:hover{background:var(--cyan-d);transform:translateY(-2px)}
.btn-sm{padding:8px 18px;font-size:10px;letter-spacing:1px}
.btn-danger{background:linear-gradient(135deg,#cc0000,#ff3535);color:#fff;box-shadow:0 0 20px rgba(255,53,53,0.3)}
.btn-danger:hover{box-shadow:0 0 35px rgba(255,53,53,0.5);transform:translateY(-2px)}
.btn-green{background:linear-gradient(135deg,#007744,#00ff9d);color:#000}
.btn-green:hover{box-shadow:0 0 30px rgba(0,255,157,0.4);transform:translateY(-2px)}

.land-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:520px;margin:50px auto 0;animation:fadein 0.8s ease 0.5s both}
.lstat{background:var(--card);border:1px solid var(--b-dim);border-radius:var(--r);padding:20px;text-align:center}
.lstat-v{font-family:var(--hud);font-size:24px;font-weight:700;color:var(--cyan)}
.lstat-l{font-size:12px;color:var(--ts);margin-top:4px}

.land-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;max-width:900px;margin:60px auto 0;animation:fadein 0.8s ease 0.6s both}
.feat{background:var(--card);border:1px solid var(--b-dim);border-radius:var(--r2);padding:24px;transition:all 0.3s}
.feat:hover{border-color:var(--b-glow);box-shadow:0 0 25px rgba(0,200,255,0.07);transform:translateY(-4px)}
.feat-icon{font-size:28px;margin-bottom:12px}
.feat-title{font-family:var(--hud);font-size:13px;color:var(--cyan);margin-bottom:8px}
.feat-desc{font-size:14px;color:var(--ts);line-height:1.6}

@keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(0,100,200,0.08) 0%,transparent 60%)}
.auth-box{background:var(--card);border:1px solid var(--b-glow);border-radius:var(--r2);padding:44px;width:100%;max-width:400px;box-shadow:0 0 60px rgba(0,200,255,0.07)}
.auth-logo{font-family:var(--hud);font-size:20px;color:var(--cyan);text-align:center;margin-bottom:8px}
.auth-tagline{color:var(--ts);font-size:13px;text-align:center;margin-bottom:32px}
.field{margin-bottom:18px}
.field label{display:block;font-family:var(--mono);font-size:11px;color:var(--ts);margin-bottom:7px;letter-spacing:0.5px}
.field input, .field select{width:100%;background:var(--deep);border:1px solid var(--b-dim);color:var(--tp);padding:11px 14px;border-radius:var(--r);font-family:var(--mono);font-size:13px;transition:border 0.2s;outline:none}
.field input:focus, .field select:focus{border-color:var(--b-glow)}
.auth-switch{text-align:center;margin-top:20px;font-size:13px;color:var(--ts)}
.auth-switch span{color:var(--cyan);cursor:pointer}
.auth-switch span:hover{text-decoration:underline}
.auth-demo{background:var(--deep);border:1px solid var(--b-dim);border-radius:var(--r);padding:14px;margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--td)}
.demo-cred{color:var(--ts);margin-top:4px}
.err-msg{background:rgba(255,53,53,0.1);border:1px solid var(--red-g);border-radius:var(--r);padding:11px 14px;color:var(--red);font-size:13px;margin-bottom:16px}

/* ── APP SHELL ── */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:58px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:rgba(6,13,20,0.97);border-bottom:1px solid var(--b-dim);display:flex;align-items:center;padding:0 20px;gap:16px;backdrop-filter:blur(12px);z-index:100;position:sticky;top:0}
.tb-logo{font-family:var(--hud);font-size:14px;color:var(--cyan);font-weight:700;letter-spacing:1px}
.tb-logo span{color:var(--green)}
.tb-spacer{flex:1}
.tb-status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ts)}
.tb-dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot-red{background:var(--red);box-shadow:0 0 8px var(--red)}
.dot-yellow{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.tb-time{font-family:var(--mono);font-size:11px;color:var(--td);padding:0 16px;border-left:1px solid var(--b-dim)}
.tb-user{font-family:var(--mono);font-size:11px;background:var(--cyan-d);border:1px solid var(--b-glow);color:var(--cyan);padding:5px 12px;border-radius:100px}
.tb-alert-badge{background:var(--red);color:#fff;font-size:10px;font-family:var(--hud);padding:3px 8px;border-radius:100px;animation:pulse-red 1.5s infinite}
@keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(255,53,53,0.5)}50%{box-shadow:0 0 0 6px rgba(255,53,53,0)}}

.sidebar{background:var(--deep);border-right:1px solid var(--b-dim);padding:20px 0;overflow-y:auto}
.nav-section{padding:0 14px;margin-bottom:6px}
.nav-label{font-family:var(--mono);font-size:9px;color:var(--td);letter-spacing:1.5px;padding:10px 8px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all 0.2s;font-size:14px;color:var(--ts);margin-bottom:2px}
.nav-item:hover{background:var(--cyan-d);color:var(--tp)}
.nav-item.active{background:var(--cyan-d);border:1px solid var(--b-glow);color:var(--cyan)}
.nav-icon{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-family:var(--hud);padding:2px 6px;border-radius:100px}
.nav-warn-badge{margin-left:auto;background:var(--yellow);color:#000;font-size:9px;font-family:var(--hud);padding:2px 6px;border-radius:100px}
.sidebar-footer{padding:14px;margin-top:auto}
.logout-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--ts);font-size:14px;transition:all 0.2s;width:100%}
.logout-btn:hover{background:var(--red-d);color:var(--red)}

.main{overflow-y:auto;background:var(--void)}
.page{padding:24px;animation:fadein 0.3s ease}

/* ── CARDS & PANELS ── */
.page-title{font-family:var(--hud);font-size:18px;color:var(--tp);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--td);margin-bottom:24px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1100px){.grid4{grid-template-columns:repeat(2,1fr)}.app{grid-template-columns:1fr}}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}.sidebar{display:none}}
.panel{background:var(--card);border:1px solid var(--b-dim);border-radius:var(--r2);padding:22px;transition:border 0.3s}
.panel:hover{border-color:rgba(0,200,255,0.14)}
.panel-title{font-family:var(--hud);font-size:11px;color:var(--ts);letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.panel-title-icon{font-size:14px}

/* ── SENSOR CARDS ── */
.sensor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
@media(max-width:700px){.sensor-grid{grid-template-columns:1fr}}
.sensor-card{background:var(--card);border-radius:var(--r2);padding:22px;position:relative;overflow:hidden;transition:all 0.3s}
.sensor-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r2) var(--r2) 0 0}
.sc-safe::before{background:linear-gradient(90deg,var(--green),rgba(0,255,157,0.3))}
.sc-warning::before{background:linear-gradient(90deg,var(--yellow),rgba(255,187,0,0.3))}
.sc-critical::before{background:linear-gradient(90deg,var(--red),rgba(255,53,53,0.3))}
.sc-safe{border:1px solid rgba(0,255,157,0.2)}
.sc-warning{border:1px solid rgba(255,187,0,0.3);box-shadow:0 0 20px rgba(255,187,0,0.05)}
.sc-critical{border:1px solid var(--red-g);box-shadow:0 0 25px rgba(255,53,53,0.08);animation:crit-glow 2s infinite}
@keyframes crit-glow{0%,100%{box-shadow:0 0 20px rgba(255,53,53,0.05)}50%{box-shadow:0 0 35px rgba(255,53,53,0.15)}}
.sc-icon{font-size:26px;margin-bottom:12px}
.sc-label{font-family:var(--mono);font-size:10px;color:var(--ts);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.sc-value{font-family:var(--hud);font-size:34px;font-weight:700;line-height:1;margin-bottom:4px}
.sc-unit{font-size:14px;color:var(--ts);margin-left:4px}
.sc-range{font-family:var(--mono);font-size:10px;color:var(--td);margin-top:8px}
.sc-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;margin-top:12px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:2px;transition:width 0.8s ease}
.sc-status{font-family:var(--hud);font-size:9px;letter-spacing:1px;margin-top:10px;text-transform:uppercase}

/* ── STATUS BANNER ── */
.status-banner{border-radius:var(--r2);padding:18px 22px;display:flex;align-items:center;gap:16px;margin-bottom:20px;transition:all 0.5s}
.sb-safe{background:linear-gradient(135deg,rgba(0,255,157,0.05),rgba(0,255,157,0.02));border:1px solid rgba(0,255,157,0.25)}
.sb-warning{background:linear-gradient(135deg,rgba(255,187,0,0.06),rgba(255,187,0,0.02));border:1px solid rgba(255,187,0,0.35)}
.sb-critical{background:linear-gradient(135deg,rgba(255,53,53,0.08),rgba(255,53,53,0.02));border:1px solid rgba(255,53,53,0.4);animation:crit-border 1.5s infinite}
@keyframes crit-border{0%,100%{border-color:rgba(255,53,53,0.4)}50%{border-color:rgba(255,53,53,0.8)}}
.sb-icon{font-size:32px}
.sb-text{}
.sb-title{font-family:var(--hud);font-size:14px;font-weight:700}
.sb-desc{font-size:13px;color:var(--ts);margin-top:3px}
.sb-score{margin-left:auto;text-align:right}
.sb-score-v{font-family:var(--hud);font-size:26px;font-weight:700}
.sb-score-l{font-family:var(--mono);font-size:10px;color:var(--ts)}
.safe-color{color:var(--green)}
.warn-color{color:var(--yellow)}
.crit-color{color:var(--red)}

/* ── CONTROLS ── */
.ctrl-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:16px;background:var(--card);border:1px solid var(--b-dim);border-radius:var(--r2);margin-bottom:20px}
.ctrl-label{font-family:var(--mono);font-size:11px;color:var(--td);margin-right:4px}
.mode-btns{display:flex;gap:6px}
.mode-btn{padding:7px 16px;border-radius:8px;font-family:var(--hud);font-size:10px;cursor:pointer;transition:all 0.2s;border:1px solid var(--b-dim);background:transparent;color:var(--ts);letter-spacing:0.5px}
.mode-btn.active-normal{background:var(--green-d);border-color:var(--green-g);color:var(--green)}
.mode-btn.active-random{background:var(--yellow-d);border-color:rgba(255,187,0,0.4);color:var(--yellow)}
.mode-btn.active-anomaly{background:var(--red-d);border-color:var(--red-g);color:var(--red)}
.mode-btn:hover{background:var(--cyan-d);border-color:var(--b-glow);color:var(--cyan)}
.interval-sel{background:var(--deep);border:1px solid var(--b-dim);color:var(--ts);padding:7px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;outline:none;cursor:pointer}
.speed-label{font-family:var(--mono);font-size:11px;color:var(--ts);display:flex;align-items:center;gap:6px}

/* ── CHART ── */
.chart-wrap{position:relative;height:240px}
canvas{border-radius:8px}

/* ── HISTORY TABLE ── */
.htable{width:100%;border-collapse:collapse}
.htable th{font-family:var(--mono);font-size:10px;color:var(--td);padding:10px 14px;text-align:left;border-bottom:1px solid var(--b-dim);letter-spacing:0.5px;text-transform:uppercase}
.htable td{padding:10px 14px;font-family:var(--mono);font-size:12px;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--ts)}
.htable tr:hover td{background:rgba(0,200,255,0.02)}
.tag{display:inline-block;padding:3px 10px;border-radius:100px;font-family:var(--hud);font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}
.tag-safe{background:var(--green-d);color:var(--green);border:1px solid var(--green-g)}
.tag-warning{background:var(--yellow-d);color:var(--yellow);border:1px solid rgba(255,187,0,0.35)}
.tag-critical{background:var(--red-d);color:var(--red);border:1px solid var(--red-g)}
.tbl-scroll{overflow-x:auto;max-height:360px;overflow-y:auto}

/* ── STATS ── */
.stat-card{background:var(--card);border:1px solid var(--b-dim);border-radius:var(--r2);padding:20px;text-align:center;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.sc-total::after{background:linear-gradient(90deg,var(--cyan),transparent)}
.sc-anom::after{background:linear-gradient(90deg,var(--red),transparent)}
.sc-warn::after{background:linear-gradient(90deg,var(--yellow),transparent)}
.sc-crit::after{background:linear-gradient(90deg,var(--orange),transparent)}
.stat-v{font-family:var(--hud);font-size:32px;font-weight:700;margin-bottom:4px}
.stat-l{font-family:var(--mono);font-size:10px;color:var(--ts);letter-spacing:0.5px}
.stat-icon{font-size:22px;margin-bottom:10px}

/* ── AI CHATBOT ── */
.chat-wrap{display:flex;flex-direction:column;height:600px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg{max-width:88%;animation:fadein 0.3s ease}
.msg-ai{align-self:flex-start}
.msg-user{align-self:flex-end}
.msg-bubble{padding:13px 16px;border-radius:16px;font-size:14px;line-height:1.7}
.msg-ai .msg-bubble{background:var(--card3);border:1px solid var(--b-dim);color:var(--tp);border-bottom-left-radius:4px}
.msg-user .msg-bubble{background:linear-gradient(135deg,#0055aa,#0088ff);color:#fff;border-bottom-right-radius:4px}
.msg-meta{font-family:var(--mono);font-size:9px;color:var(--td);margin-top:5px;padding:0 4px}
.msg-ai .msg-meta{text-align:left}
.msg-user .msg-meta{text-align:right}
.ai-avatar{width:30px;height:30px;background:linear-gradient(135deg,#0055aa,#00c8ff);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;margin-bottom:6px;box-shadow:0 0 15px rgba(0,200,255,0.3)}
.typing{display:flex;align-items:center;gap:5px;padding:14px 16px;background:var(--card3);border:1px solid var(--b-dim);border-radius:16px;border-bottom-left-radius:4px;width:72px}
.typing span{width:6px;height:6px;background:var(--cyan);border-radius:50%;animation:typing 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-footer{padding:14px 16px;border-top:1px solid var(--b-dim);display:flex;gap:10px}
.chat-input{flex:1;background:var(--deep);border:1px solid var(--b-dim);color:var(--tp);padding:11px 14px;border-radius:10px;font-family:var(--body);font-size:14px;outline:none;transition:border 0.2s}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── ISOLATION FOREST (Pure JS) ─────────────────────────────
class IsolationForest {
  constructor(numTrees=100, sampleSize=256, contamination=0.05) {
    this.numTrees = numTrees; this.sampleSize = sampleSize;
    this.contamination = contamination; this.trees = [];
    this.fitted = false; this.threshold = 0;
  }
  fit(data) {
    this.trees = [];
    for(let i=0;i<this.numTrees;i++) {
      const sample = this._sample(data, Math.min(this.sampleSize, data.length));
      this.trees.push(this._buildTree(sample, 0, Math.ceil(Math.log2(sample.length))+1));
    }
    this.fitted = true;
    const scores = data.map(p => this._anomalyScore(p));
    scores.sort((a,b)=>b-a);
    this.threshold = scores[Math.floor(scores.length * this.contamination)] || 0.55;
    return this;
  }
  _sample(data, n) {
    const s=[...data]; for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]]}
    return s.slice(0,n);
  }
  _buildTree(data, depth, maxDepth) {
    if(data.length<=1||depth>=maxDepth) return {isLeaf:true,size:data.length};
    const feat = Math.floor(Math.random()*data[0].length);
    const vals = data.map(p=>p[feat]);
    const mn=Math.min(...vals), mx=Math.max(...vals);
    if(mn===mx) return {isLeaf:true,size:data.length};
    const split = mn+Math.random()*(mx-mn);
    const left=data.filter(p=>p[feat]<split), right=data.filter(p=>p[feat]>=split);
    return {isLeaf:false,feat,split,left:this._buildTree(left,depth+1,maxDepth),right:this._buildTree(right,depth+1,maxDepth)};
  }
  _pathLen(point, node, depth=0) {
    if(node.isLeaf) return depth+(node.size>1?this._c(node.size):0);
    return point[node.feat]<node.split?this._pathLen(point,node.left,depth+1):this._pathLen(point,node.right,depth+1);
  }
  _c(n){return n<=1?0:2*(Math.log(n-1)+0.5772156649)-2*(n-1)/n}
  _anomalyScore(point) {
    const avg = this.trees.reduce((s,t)=>s+this._pathLen(point,t),0)/this.trees.length;
    const c = this._c(this.sampleSize);
    return c===0?0:Math.pow(2,-avg/c);
  }
  predict(point) {
    const score = this._anomalyScore(point);
    return {score, isAnomaly: score>=this.threshold, rawScore: score};
  }
}

// ─── BASELINE TRAINING DATA ───────────────────────────────────
function generateBaseline(n=600) {
  const data=[];
  for(let i=0;i<n;i++) data.push([
    60+Math.random()*25,   // temp 60-85
    2.5+Math.random()*3,   // press 2.5-5.5
    0.2+Math.random()*2.0  // vib 0.2-2.2
  ]);
  return data;
}

// ─── EXPLAIN ANOMALY ─────────────────────────────────────────
function explainAnomaly(temp, press, vib, score) {
  const reasons=[], recs=[];
  if(temp>95){reasons.push(`Critical temperature ${temp.toFixed(1)}°C (safe: ≤85°C)`);recs.push("Immediately check cooling system and heat exchangers")}
  else if(temp>85){reasons.push(`High temperature ${temp.toFixed(1)}°C exceeds warning threshold`);recs.push("Inspect cooling fans and fluid levels")}
  if(press>6.0){reasons.push(`Critical pressure ${press.toFixed(2)} bar (max rated: 6.0 bar)`);recs.push("Check pressure relief valves, reduce load immediately")}
  else if(press>5.5){reasons.push(`Elevated pressure ${press.toFixed(2)} bar above normal range`);recs.push("Monitor trends and inspect for blockages")}
  if(vib>3.0){reasons.push(`Severe vibration ${vib.toFixed(2)} mm/s — structural risk`);recs.push("Stop machine, inspect bearings and mechanical looseness")}
  else if(vib>2.5){reasons.push(`High vibration ${vib.toFixed(2)} mm/s above threshold`);recs.push("Schedule bearing inspection and alignment check")}
  if(!reasons&&score>0.5){reasons.push("Statistical deviation detected by Isolation Forest model");recs.push("Review recent operational changes and monitor closely")}
  return {reasons, recommendations: recs};
}

// ─── SIMULATE READINGS ────────────────────────────────────────
function simulateReadings(mode) {
  if(mode==='normal') return {
    temperature: 62+Math.random()*20+Math.sin(Date.now()/5000)*3,
    pressure: 2.8+Math.random()*2.4+Math.cos(Date.now()/4000)*0.3,
    vibration: 0.3+Math.random()*1.7+Math.sin(Date.now()/3000)*0.2
  };
  if(mode==='anomaly') return {
    temperature: 88+Math.random()*20,
    pressure: 5.6+Math.random()*2.0,
    vibration: 2.6+Math.random()*1.8
  };
  // random: 25% anomaly
  return Math.random()<0.25 ? {
    temperature: 88+Math.random()*18, pressure: 5.5+Math.random()*2, vibration: 2.4+Math.random()*2
  } : {
    temperature: 62+Math.random()*20, pressure: 2.8+Math.random()*2.4, vibration: 0.3+Math.random()*1.7
  };
}

// ─── AUTH STORE ───────────────────────────────────────────────
const USERS_KEY='ics_users_v3';

const ALERTS_KEY='ics_alerts_v3';

  {id:1,username:'admin',password:'admin123',role:'Admin'},
  {id:2,username:'operator',password:'op123',role:'Operator'}
];
function getUsers(){try{return JSON.parse(localStorage.getItem(USERS_KEY))||defaultUsers}catch{return defaultUsers}}

function getHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[]}catch{return[]}}
function saveHistory(h){localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(-500)))}

// ─── AUTH PAGE ────────────────────────────────────────────────
function Auth({onLogin}) {
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({username:'',password:'',role:'Operator'});
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  const handle=()=>{
    setErr('');setLoading(true);
    setTimeout(()=>{
      const users=getUsers();
      if(mode==='login'){
        const found=users.find(u=>u.username===form.username&&u.password===form.password);
        if(found) onLogin(found); else setErr('Invalid username or password');
      } else {
        if(!form.username||!form.password){setErr('All fields required');setLoading(false);return}
        if(users.find(u=>u.username===form.username)){setErr('Username already taken');setLoading(false);return}
        const nu={id:Date.now(),username:form.username,password:form.password,role:form.role};
        saveUsers([...users,nu]); onLogin(nu);
      }
      setLoading(false);
    },400);
  };

  return (
    <div className="auth-wrap">
      <div className="auth-box">
        <div className="auth-logo">⚡ IndustrialShield <span style={{color:'var(--green)'}}>AI</span></div>
        <div className="auth-tagline">ICS Cybersecurity Monitor — Secure Access</div>
        {err&&<div className="err-msg">⚠ {err}</div>}
        <div className="field"><label>USERNAME</label><input value={form.username} onChange={e=>setForm({...form,username:e.target.value})} placeholder="Enter username" onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
        <div className="field"><label>PASSWORD</label><input type="password" value={form.password} onChange={e=>setForm({...form,password:e.target.value})} placeholder="Enter password" onKeyDown={e=>e.key==='Enter'&&handle()}/></div>
        {mode==='register'&&<div className="field"><label>ROLE</label><select value={form.role} onChange={e=>setForm({...form,role:e.target.value})}><option>Operator</option><option>Admin</option></select></div>}
        <button className="btn btn-primary w100" onClick={handle} disabled={loading} style={{marginTop:4}}>
          {loading?<span className="loading-spin"/>:mode==='login'?'🔓 Sign In':'✅ Create Account'}
        </button>
        <div className="auth-switch">
          {mode==='login'?<>No account? <span onClick={()=>setMode('register')}>Register here</span></>:<>Have account? <span onClick={()=>setMode('login')}>Sign in</span></>}
        </div>
        {mode==='login'&&<div className="auth-demo">
          <div style={{color:'var(--cyan)',fontFamily:'var(--hud)',fontSize:'10px',marginBottom:'6px'}}>DEMO CREDENTIALS</div>
          <div className="demo-cred">Admin: admin / admin123</div>
          <div className="demo-cred">Operator: operator / op123</div>
        </div>}
      </div>
    </div>
  );
}

  const [alertCount,setAlertCount]=useState(0);

  const addToast=(title,msg,type='info')=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,title,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),5000);
  };

  const isAdmin=user?.role==='Admin';

  const navItems=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'analytics',icon:'📈',label:'Analytics'},
    {id:'alerts',icon:'🔔',label:'Alerts',badge:alertCount>0?alertCount:null},
    {id:'chatbot',icon:'🤖',label:'AI Assistant'},
    ...(isAdmin?[{id:'admin',icon:'🔐',label:'Admin Panel'}]:[]),
    {id:'about',icon:'ℹ️',label:'About'},
  ];

  return (
    <div className="app">
      {/* TOPBAR */}
      <div className="topbar">
        <div className="tb-logo">⚡ INDUSTRIAL<span>SHIELD</span> AI</div>
        <div className="tb-status">

        <div className="tb-spacer"/>
        <Clock/>
        <div className="tb-user">👤 {user?.username} · {user?.role}</div>
      </div>
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="nav-section">
          <div className="nav-label">Navigation</div>
          {navItems.map(item=>(
            <div key={item.id} className={`nav-item${activePage===item.id?' active':''}`} onClick={()=>setActivePage(item.id)}>
              <span className="nav-icon">{item.icon}</span>
              {item.label}
              {item.badge&&<span className="nav-badge">{item.badge}</span>}

          ))}
        </div>
        <div style={{flex:1}}/>
        <div className="sidebar-footer">
          <button className="logout-btn" onClick={onLogout}><span>🚪</span> Sign Out</button>

      </div>
      {/* MAIN */}
      <div className="main">
        {activePage==='dashboard'&&<Dashboard user={user} onStatusChange={setCurrentStatus} addToast={addToast} onNewAlert={()=>setAlertCount(c=>c+1)} onGoAlerts={()=>setActivePage('alerts')} onGoChatbot={()=>setActivePage('chatbot')}/>}
        {activePage==='analytics'&&<Analytics/>}

      </div>
      {/* TOASTS */}
      <div className="toast-wrap">
        {toasts.map(t=>(

            <div className="toast-title">{t.title}</div>
            <div className="toast-msg">{t.msg}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function Clock() {
  const [time,setTime]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(i)},[]);
  return <div className="tb-time">{time.toLocaleTimeString()} · {time.toLocaleDateString()}</div>;
}

// ─── DASHBOARD ───────────────────────────────────────────────
function Dashboard({user,onStatusChange,addToast,onNewAlert,onGoAlerts,onGoChatbot}) {
  const [readings,setReadings]=useState({temperature:72,pressure:3.8,vibration:1.1});
  const [result,setResult]=useState(null);
  const [mode,setMode]=useState('normal');
  const [running,setRunning]=useState(true);
  const [interval_,setInterval_]=useState(3000);
  const [history,setHistory]=useState(getHistory());
  const [model,setModel]=useState(null);
  const chartRef=useRef(null);
  const chartInstance=useRef(null);
  const audioCtx=useRef(null);
  const intervalRef=useRef(null);

  // Init model
  useEffect(()=>{
    const m=new IsolationForest(80,256,0.05);
    m.fit(generateBaseline());
    setModel(m);
  },[]);

  // Sound alert
  const playAlert=(level)=>{
    try{
      if(!audioCtx.current) audioCtx.current=new(window.AudioContext||window.webkitAudioContext)();
      const ctx=audioCtx.current;
      const osc=ctx.createOscillator(); const gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=level==='critical'?880:440;
      osc.type=level==='critical'?'sawtooth':'sine';
      gain.gain.setValueAtTime(0.15,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+(level==='critical'?0.6:0.3));
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime+(level==='critical'?0.6:0.3));
    }catch(e){}
  };

  // Run prediction
  const predict=useCallback((r)=>{
    if(!model) return;
    const {temperature:temp,pressure:press,vibration:vib}=r;
    const input=[temp,press,vib];
    const {score,isAnomaly}=model.predict(input);
    const normalized=Math.min(Math.max(score,0),1);
    let level='safe';
    if(isAnomaly) level=normalized>0.7?'critical':'warning';
    const {reasons,recommendations}=explainAnomaly(temp,press,vib,normalized);
    const newResult={temperature:temp,pressure:press,vibration:vib,score:normalized,isAnomaly,level,confidence:Math.round(normalized*100),reasons,recommendations,timestamp:new Date().toISOString()};
    setResult(newResult);
    onStatusChange(level);

    const rec={...newResult,id:Date.now()};
    const newHist=[rec,...history].slice(0,500);
    setHistory(newHist);
    saveHistory(newHist);

    if(level!=='safe'){
      playAlert(level);
      onNewAlert();
      addToast(level==='critical'?'🚨 CRITICAL ANOMALY':'⚠ WARNING DETECTED',
        `T:${temp.toFixed(1)}° P:${press.toFixed(2)}bar V:${vib.toFixed(2)}mm/s`,level);
      const alerts=getAlerts();
      saveAlerts([{...newResult,id:Date.now()},...alerts]);
    }

  // Auto-simulation

      const r=simulateReadings(mode);

function SensorCard({icon,label,value,unit,min,max,warn,crit,color,range}) {
  const v=parseFloat(value);
  const pct=Math.min(((v-min)/(max-min))*100,100);
  const level=v>=crit?'critical':v>=warn?'warning':'safe';
  return (
    <div className={`sensor-card sc-${level}`}>
      <div className="sc-icon">{icon}</div>
      <div className="sc-label">{label}</div>
      <div className="sc-value" style={{color}}>
        {value}<span className="sc-unit">{unit}</span>
      </div>
      <div className="sc-bar"><div className="sc-bar-fill" style={{width:pct+'%',background:color,opacity:0.85}}/></div>
      <div className="sc-range">{range}</div>
      <div className={`sc-status ${level==='critical'?'text-red':level==='warning'?'text-yellow':'text-green'}`}>
        {level==='critical'?'⚡ CRITICAL':level==='warning'?'⚠ WARNING':'● NORMAL'}
      </div>
    </div>
  );
}

function offlineReply(q, currentStatus, latestReading, history) {
  const query = q.toLowerCase();
  const lr = latestReading;
  const total = history.length;
  const anomalies = history.filter(h=>h.isAnomaly).length;
  const criticals = history.filter(h=>h.level==='critical').length;
  const warnings  = history.filter(h=>h.level==='warning').length;
  const safeRate  = total ? Math.round(((total-anomalies)/total)*100) : 100;

  // ── WHY ABNORMAL ──
  if(query.includes('why') || query.includes('abnormal') || query.includes('anomaly') || query.includes('reason')) {
    if(!lr || !lr.isAnomaly) return `✅ System is currently NORMAL — no anomaly detected.\n\nLatest readings are within safe operating ranges:\n• Temperature: ${lr?lr.temperature.toFixed(1)+'°C':'N/A'} (safe: 60–85°C)\n• Pressure: ${lr?lr.pressure.toFixed(2)+' bar':'N/A'} (safe: 2.5–5.5 bar)\n• Vibration: ${lr?lr.vibration.toFixed(2)+' mm/s':'N/A'} (safe: 0.1–2.5 mm/s)\n\nContinue monitoring. No action required.`;
    let reasons = [];
    if(lr.temperature > 95) reasons.push(`🌡 CRITICAL Temperature: ${lr.temperature.toFixed(1)}°C is ${(lr.temperature-85).toFixed(1)}°C above the safe limit of 85°C. This indicates cooling system failure or extreme overload.`);
    else if(lr.temperature > 85) reasons.push(`🌡 HIGH Temperature: ${lr.temperature.toFixed(1)}°C exceeds the 85°C warning threshold. Cooling fans may be failing or ambient temperature too high.`);
    if(lr.pressure > 6.0) reasons.push(`🔧 CRITICAL Pressure: ${lr.pressure.toFixed(2)} bar exceeds the maximum rated pressure of 6.0 bar. Risk of equipment rupture.`);
    else if(lr.pressure > 5.5) reasons.push(`🔧 HIGH Pressure: ${lr.pressure.toFixed(2)} bar above normal range (2.5–5.5 bar). Possible blockage or valve malfunction.`);
    if(lr.vibration > 3.0) reasons.push(`📳 CRITICAL Vibration: ${lr.vibration.toFixed(2)} mm/s indicates severe mechanical instability. Bearing failure likely.`);
    else if(lr.vibration > 2.5) reasons.push(`📳 HIGH Vibration: ${lr.vibration.toFixed(2)} mm/s above safe threshold (0.1–2.5 mm/s). Possible imbalance or bearing wear.`);
    if(!reasons.length) reasons.push(`🧠 The Isolation Forest ML model detected a statistical deviation in the combined sensor pattern, even though individual values may appear borderline. This multi-variate anomaly is a subtle early warning.`);
    return `⚠️ ANOMALY ANALYSIS — ${lr.level.toUpperCase()}\nAnomaly Score: ${lr.confidence}%\n\n${reasons.join('\n\n')}`;
  }

  // ── WHAT TO DO ──
  if(query.includes('what should') || query.includes('do now') || query.includes('action') || query.includes('recommend') || query.includes('fix') || query.includes('solve')) {
    if(currentStatus==='safe') return `✅ System is SAFE — no immediate action required.\n\nPreventive recommendations:\n• Continue scheduled maintenance every 30 days\n• Log all readings for trend analysis\n• Ensure cooling system is serviced quarterly\n• Test pressure relief valves monthly\n• Vibration baseline check every 2 weeks`;
    let actions = [];
    if(lr && lr.temperature > 95) { actions.push('🚨 IMMEDIATE: Reduce machine load by 50%'); actions.push('🚨 Check and restart cooling system'); actions.push('🔧 Inspect heat exchanger for fouling'); actions.push('📞 Alert maintenance engineer now'); }
    else if(lr && lr.temperature > 85) { actions.push('⚠️ Increase cooling fan speed to maximum'); actions.push('🔧 Check coolant fluid levels'); actions.push('📊 Monitor temperature trend for next 10 minutes'); }
    if(lr && lr.pressure > 6.0) { actions.push('🚨 IMMEDIATE: Engage pressure relief valve'); actions.push('🚨 Reduce process inlet flow rate'); actions.push('🔧 Inspect outlet pipeline for blockage'); }
    else if(lr && lr.pressure > 5.5) { actions.push('⚠️ Inspect filters — possible partial blockage'); actions.push('📊 Monitor pressure trend closely'); }
    if(lr && lr.vibration > 3.0) { actions.push('🚨 STOP MACHINE IMMEDIATELY — severe vibration risk'); actions.push('🔧 Inspect main bearings and shaft alignment'); actions.push('🔩 Check all mechanical fasteners and foundation bolts'); }
    else if(lr && lr.vibration > 2.5) { actions.push('⚠️ Schedule bearing inspection within 24 hours'); actions.push('🔧 Check belt tension and coupling alignment'); }
    if(!actions.length) { actions = ['📊 Monitor sensors for next 5 minutes','🔧 Check for recent operational changes','📋 Review maintenance log for past 7 days','👷 Alert operator on duty']; }
    return `🛠️ RECOMMENDED ACTIONS (${currentStatus.toUpperCase()}):\n\n${actions.map((a,i)=>`${i+1}. ${a}`).join('\n')}`;
  }

  // ── TREND ANALYSIS ──
  if(query.includes('trend') || query.includes('recent') || query.includes('analyze') || query.includes('analysis') || query.includes('pattern')) {
    if(total < 3) return `📊 Not enough data yet for trend analysis. Run the simulation for at least 30 seconds first.`;
    const last10 = history.slice(0,10);
    const avgT = (last10.reduce((s,h)=>s+h.temperature,0)/last10.length).toFixed(1);
    const avgP = (last10.reduce((s,h)=>s+h.pressure,0)/last10.length).toFixed(2);
    const avgV = (last10.reduce((s,h)=>s+h.vibration,0)/last10.length).toFixed(2);
    const recentAnom = last10.filter(h=>h.isAnomaly).length;
    const trend = recentAnom >= 5 ? '🔴 DETERIORATING — high anomaly rate in recent readings' : recentAnom >= 2 ? '🟡 UNSTABLE — intermittent anomalies detected' : '🟢 STABLE — mostly normal operation';
    return `📈 TREND ANALYSIS (Last ${last10.length} readings)\n\nStatus: ${trend}\n\nAverages:\n• Temperature: ${avgT}°C\n• Pressure: ${avgP} bar\n• Vibration: ${avgV} mm/s\n\nSession Summary:\n• Total readings: ${total}\n• Anomalies: ${anomalies} (${100-safeRate}%)\n• Criticals: ${criticals}\n• Warnings: ${warnings}\n• Safe rate: ${safeRate}%\n\n${recentAnom>3?'⚠️ High anomaly frequency suggests systematic issue — consider scheduling maintenance.':'✅ Anomaly rate is within acceptable range for normal operations.'}`;
  }

  // ── CYBERATTACK ──
  if(query.includes('cyber') || query.includes('attack') || query.includes('hack') || query.includes('intrusion') || query.includes('security')) {
    const suspiciousPattern = anomalies > total*0.4 && total > 10;
    return `🔐 CYBERSECURITY ANALYSIS\n\nIndustrial systems (ICS/SCADA) can be targeted by cyberattacks that manipulate sensor values. Famous example: Stuxnet (2010) targeted Iranian nuclear plant centrifuges.\n\n${suspiciousPattern ? '⚠️ SUSPICIOUS: High anomaly rate ('+Math.round(anomalies/total*100)+'%) could indicate:\n• Sensor data manipulation\n• Replay attack on sensor feeds\n• Man-in-the-middle on data network' : '✅ No suspicious patterns detected currently.'}\n\nSigns of a cyber-physical attack:\n• Sudden unexplained sensor spikes\n• Multiple sensors anomalous simultaneously\n• Anomalies that don\'t match physical wear patterns\n• Readings that seem "too perfect" or "too random"\n\nRecommendations:\n• Ensure OT/IT network segmentation\n• Monitor for unauthorized device connections\n• Check ICS firewall logs\n• Verify sensor calibration physically`;
  }

  // ── ISOLATION FOREST ──
  if(query.includes('isolation') || query.includes('forest') || query.includes('ml') || query.includes('model') || query.includes('algorithm') || query.includes('how does')) {
    return `🧠 ISOLATION FOREST EXPLAINED\n\nIsolation Forest is an unsupervised machine learning algorithm perfect for anomaly detection.\n\nHow it works:\n1. Build many random decision trees (this app uses 80 trees)\n2. For each data point, count how many splits it takes to isolate it\n3. Normal points take MANY splits (they're buried in clusters)\n4. Anomalies take FEW splits (they're far from the crowd)\n5. Score = average path length across all trees\n\nWhy it's great for ICS:\n• No labels needed — learns "normal" on its own\n• Works on multi-sensor data simultaneously\n• Fast — processes readings in milliseconds\n• Catches subtle multi-variate anomalies\n\nThis app's config:\n• 80 estimator trees\n• 256 sample size per tree\n• 5% contamination rate\n• Trained on 600 baseline readings\n• Inputs: [temperature, pressure, vibration]`;
  }

  // ── MAINTENANCE REPORT ──
  if(query.includes('maintenance') || query.includes('report') || query.includes('summary') || query.includes('generate')) {
    const now = new Date().toLocaleString();
    return `📋 MAINTENANCE REPORT — ${now}\n${'─'.repeat(40)}\n\nSYSTEM STATUS: ${currentStatus.toUpperCase()}\n\nSESSION STATISTICS:\n• Total readings analyzed: ${total}\n• Anomalies detected: ${anomalies}\n• Critical events: ${criticals}\n• Warning events: ${warnings}\n• Safe readings: ${total-anomalies}\n• System health: ${safeRate}%\n\nLATEST SENSOR READINGS:\n• Temperature: ${lr?lr.temperature.toFixed(1)+'°C':'No data'}\n• Pressure: ${lr?lr.pressure.toFixed(2)+' bar':'No data'}\n• Vibration: ${lr?lr.vibration.toFixed(2)+' mm/s':'No data'}\n• Anomaly score: ${lr?lr.confidence+'%':'N/A'}\n\nRECOMMENDED MAINTENANCE:\n• ${safeRate>95?'✅ No urgent maintenance required':'⚠️ Investigate anomaly root cause'}\n• Schedule next inspection: ${safeRate>90?'30 days':'7 days'}\n• Bearing lubrication: Monthly\n• Pressure valve test: Monthly\n• Cooling system flush: Quarterly\n\nReport generated by IndustrialShield AI v3.0`;
  }

  // ── TEMPERATURE ──
  if(query.includes('temperature') || query.includes('temp') || query.includes('heat') || query.includes('hot') || query.includes('cooling')) {
    if(!lr) return 'No temperature data available yet. Start the simulation on the Dashboard.';
    const t = lr.temperature;
    const status = t>95?'🔴 CRITICAL':t>85?'🟡 WARNING':'🟢 NORMAL';
    return `🌡️ TEMPERATURE ANALYSIS\n\nCurrent: ${t.toFixed(1)}°C — ${status}\n\nThresholds:\n• Normal: 60–85°C\n• Warning: >85°C\n• Critical: >95°C\n\n${t>95?'CRITICAL: Immediate cooling required. Check heat exchanger, coolant levels, and ambient temperature. Reduce machine load immediately.':t>85?'WARNING: Temperature trending high. Inspect cooling fans and fluid levels. Monitor closely.':'Temperature is within normal operating range. No action needed.'}\n\nCommon causes of overheating:\n• Blocked air vents or filters\n• Coolant leak or low fluid\n• Overloaded motor\n• High ambient temperature\n• Heat exchanger fouling`;
  }

  // ── PRESSURE ──
  if(query.includes('pressure') || query.includes('bar') || query.includes('valve') || query.includes('blockage')) {
    if(!lr) return 'No pressure data available yet. Start the simulation on the Dashboard.';
    const p = lr.pressure;
    const status = p>6.0?'🔴 CRITICAL':p>5.5?'🟡 WARNING':'🟢 NORMAL';
    return `🔧 PRESSURE ANALYSIS\n\nCurrent: ${p.toFixed(2)} bar — ${status}\n\nThresholds:\n• Normal: 2.5–5.5 bar\n• Warning: >5.5 bar\n• Critical: >6.0 bar\n\n${p>6.0?'CRITICAL: Exceeds maximum rated pressure! Engage relief valve and reduce flow immediately.':p>5.5?'WARNING: Elevated pressure. Check for downstream blockage or partial valve closure.':'Pressure is within normal operating range.'}\n\nCommon causes of high pressure:\n• Clogged filters or strainers\n• Partially closed outlet valve\n• Downstream pipe blockage\n• Pump running at wrong speed\n• Thermal expansion in closed system`;
  }

  // ── VIBRATION ──
  if(query.includes('vibration') || query.includes('bearing') || query.includes('noise') || query.includes('shake') || query.includes('mechanical')) {
    if(!lr) return 'No vibration data available yet. Start the simulation on the Dashboard.';
    const v = lr.vibration;
    const status = v>3.0?'🔴 CRITICAL':v>2.5?'🟡 WARNING':'🟢 NORMAL';
    return `📳 VIBRATION ANALYSIS\n\nCurrent: ${v.toFixed(2)} mm/s — ${status}\n\nThresholds:\n• Normal: 0.1–2.5 mm/s\n• Warning: >2.5 mm/s\n• Critical: >3.0 mm/s\n\n${v>3.0?'CRITICAL: STOP MACHINE NOW. Severe vibration indicates imminent bearing failure or shaft misalignment. Continuing operation risks catastrophic damage.':v>2.5?'WARNING: Elevated vibration. Schedule bearing inspection within 24 hours. Monitor for worsening trend.':'Vibration is within acceptable range.'}\n\nCommon causes of high vibration:\n• Worn or damaged bearings\n• Shaft misalignment\n• Rotor imbalance\n• Loose foundation bolts\n• Resonance with connected equipment`;
  }

  // ── STATUS / HEALTH ──
  if(query.includes('status') || query.includes('health') || query.includes('current') || query.includes('now') || query.includes('ok') || query.includes('fine')) {
    return `📊 CURRENT SYSTEM STATUS: ${currentStatus.toUpperCase()}\n\n${lr?`Sensor Readings:\n• 🌡 Temperature: ${lr.temperature.toFixed(1)}°C ${lr.temperature>95?'🔴':lr.temperature>85?'🟡':'🟢'}\n• 🔧 Pressure: ${lr.pressure.toFixed(2)} bar ${lr.pressure>6?'🔴':lr.pressure>5.5?'🟡':'🟢'}\n• 📳 Vibration: ${lr.vibration.toFixed(2)} mm/s ${lr.vibration>3?'🔴':lr.vibration>2.5?'🟡':'🟢'}\n• 🎯 Anomaly Score: ${lr.confidence}%`:'No readings yet — go to Dashboard and start simulation.'}\n\nSession: ${total} readings · ${anomalies} anomalies · ${safeRate}% safe rate`;
  }

  // ── DEFAULT ──
  return `🤖 IndustrialShield AI (Offline Mode)\n\nI can help you with:\n• "Why is this abnormal?" — anomaly explanation\n• "What should I do?" — action recommendations\n• "Analyze recent trends" — trend & statistics\n• "Is this a cyberattack?" — security analysis\n• "Explain Isolation Forest" — ML model info\n• "Generate maintenance report" — full report\n• "Temperature / Pressure / Vibration" — sensor deep dive\n• "Current status" — system health overview\n\nℹ️ I'm running in offline mode. Add Anthropic API credits for full Claude AI responses.\n\nCurrent status: ${currentStatus.toUpperCase()} · ${total} readings logged`;
}

// ─── AI CHATBOT ──────────────────────────────────────────────
const API_KEY_STORAGE='ics_apikey_v3';
function ChatbotPage({currentStatus}) {
  const history=getHistory();
  const latestReading=history[0];
  const [apiKey,setApiKey]=useState(()=>localStorage.getItem(API_KEY_STORAGE)||'');
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [keyDraft,setKeyDraft]=useState('');
  const [useOffline,setUseOffline]=useState(!localStorage.getItem(API_KEY_STORAGE));
  const [messages,setMessages]=useState([{
    role:'ai',
    content:`Hello! I'm IndustrialShield AI — your ICS monitoring assistant.\n\nCurrent status: ${currentStatus.toUpperCase()}${latestReading?`\nLatest: T:${latestReading.temperature.toFixed(1)}°C · P:${latestReading.pressure.toFixed(2)}bar · V:${latestReading.vibration.toFixed(2)}mm/s`:''}\n\n${localStorage.getItem(API_KEY_STORAGE)?'🟢 Claude AI mode active — ask me anything!':'🟡 Running in offline mode — all core features work! Optionally add an Anthropic API key for full Claude AI.'}`,
    timestamp:new Date().toISOString()
  }]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[messages]);

  const saveKey=()=>{
    const k=keyDraft.trim();
    if(!k.startsWith('sk-ant-')){alert('Invalid key — must start with sk-ant-');return;}
    localStorage.setItem(API_KEY_STORAGE,k);
    setApiKey(k); setShowKeyInput(false); setKeyDraft(''); setUseOffline(false);
    setMessages(m=>[...m,{role:'ai',content:'✅ Claude AI mode activated! I now have full AI capabilities.',timestamp:new Date().toISOString()}]);
  };
  const clearKey=()=>{localStorage.removeItem(API_KEY_STORAGE);setApiKey('');setUseOffline(true);setShowKeyInput(false);};

  const buildSystemPrompt=()=>{
    const recent=history.slice(0,10);
    const stats={total:history.length,anomalies:history.filter(h=>h.isAnomaly).length,criticals:history.filter(h=>h.level==='critical').length,warnings:history.filter(h=>h.level==='warning').length};
    return `You are IndustrialShield AI, an expert ICS/SCADA monitoring assistant. Current status: ${currentStatus.toUpperCase()}. Stats: ${JSON.stringify(stats)}. Latest: ${latestReading?JSON.stringify({t:latestReading.temperature.toFixed(1),p:latestReading.pressure.toFixed(2),v:latestReading.vibration.toFixed(2),level:latestReading.level}):'none'}. Recent history: ${JSON.stringify(recent.map(r=>({t:r.temperature.toFixed(1),p:r.pressure.toFixed(2),v:r.vibration.toFixed(2),level:r.level})))}. Normal ranges: Temp 60-85C (warn>85, crit>95), Pressure 2.5-5.5bar (warn>5.5, crit>6.0), Vibration 0.1-2.5mm/s (warn>2.5, crit>3.0). Be concise, use bullet points, prioritize safety.`;
  };

  const sendMessage=async(text)=>{
    const q=text||input.trim();
    if(!q||loading) return;
    setInput('');
    const userMsg={role:'user',content:q,timestamp:new Date().toISOString()};
    setMessages(m=>[...m,userMsg]);
    setLoading(true);

    // Try Claude API if key available, else offline
    if(apiKey && !useOffline){
      try{
        const convHistory=messages.slice(-6).map(m=>({role:m.role==='ai'?'assistant':'user',content:m.content}));
        convHistory.push({role:'user',content:q});
        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,system:buildSystemPrompt(),messages:convHistory})
        });
        const data=await resp.json();
        if(data.error){
          // Fall back to offline on credit/auth errors
          const reply=offlineReply(q,currentStatus,latestReading,history);
          const errNote=data.error.type==='credit_balance_too_low'?'\n\n💡 (Claude API: insufficient credits — using offline mode. Add credits at console.anthropic.com/settings/billing)':data.error.type==='authentication_error'?'\n\n💡 (Claude API: invalid key — using offline mode)':'';
          setMessages(m=>[...m,{role:'ai',content:reply+errNote,timestamp:new Date().toISOString()}]);
        } else {
          const reply=data.content?.find(c=>c.type==='text')?.text||offlineReply(q,currentStatus,latestReading,history);
          setMessages(m=>[...m,{role:'ai',content:reply,timestamp:new Date().toISOString()}]);
        }
      }catch(e){
        // Network error — silently fall back to offline
        const reply=offlineReply(q,currentStatus,latestReading,history);
        setMessages(m=>[...m,{role:'ai',content:reply+'\n\n💡 (Offline mode — network unavailable)',timestamp:new Date().toISOString()}]);
      }
    } else {
      // Pure offline mode — simulate a small delay for realism
      await new Promise(r=>setTimeout(r,400+Math.random()*300));
      const reply=offlineReply(q,currentStatus,latestReading,history);
      setMessages(m=>[...m,{role:'ai',content:reply,timestamp:new Date().toISOString()}]);
    }
    setLoading(false);
  };

  const quickQuestions=['Why is this abnormal?','What should I do?','Analyze recent trends','Is this a cyberattack?','Explain Isolation Forest','Generate maintenance report'];

  return (
    <div className="page" style={{height:'calc(100vh - 58px)',display:'flex',flexDirection:'column'}}>
      <div className="page-title">🤖 AI Assistant</div>
      <div className="page-sub">Smart ICS expert — works offline + optional Claude AI upgrade</div>

      {/* MODE SWITCHER BAR */}
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',background:useOffline?'rgba(255,187,0,0.05)':'rgba(0,255,157,0.05)',border:`1px solid ${useOffline?'rgba(255,187,0,0.25)':'rgba(0,255,157,0.25)'}`,borderRadius:'var(--r)',marginBottom:14,flexWrap:'wrap'}}>
        <span style={{fontSize:12,fontFamily:'var(--mono)',color:useOffline?'var(--yellow)':'var(--green)'}}>
          {useOffline?'🟡 Offline Mode — Smart rule-based AI':'🟢 Claude AI Mode — Full intelligence active'}
        </span>
        <div style={{marginLeft:'auto',display:'flex',gap:8}}>
          {!useOffline&&<button className="btn btn-sm btn-secondary" style={{padding:'4px 10px',fontSize:10}} onClick={clearKey}>Switch to Offline</button>}
          {useOffline&&<button className="btn btn-sm btn-secondary" style={{padding:'4px 10px',fontSize:10}} onClick={()=>setShowKeyInput(v=>!v)}>
            {showKeyInput?'Cancel':'+ Add API Key (Claude AI)'}
          </button>}
          {!useOffline&&<span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--td)',alignSelf:'center'}}>{apiKey.slice(0,14)}••••</span>}
        </div>
      </div>

      {/* API KEY INPUT — shown only when requested */}
      {showKeyInput&&(
        <div style={{background:'rgba(0,200,255,0.05)',border:'1px solid var(--b-glow)',borderRadius:'var(--r2)',padding:'16px 18px',marginBottom:14}}>
          <div style={{fontSize:13,color:'var(--ts)',marginBottom:10}}>
            Get a free API key at <a href="https://console.anthropic.com" target="_blank" style={{color:'var(--cyan)'}}>console.anthropic.com</a> → requires $5 credit top-up to use.
          </div>
          <div style={{display:'flex',gap:10}}>
            <input style={{flex:1,background:'var(--deep)',border:'1px solid var(--b-glow)',color:'var(--tp)',padding:'9px 13px',borderRadius:'var(--r)',fontFamily:'var(--mono)',fontSize:12,outline:'none'}}
              placeholder="sk-ant-api03-..." value={keyDraft} onChange={e=>setKeyDraft(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&saveKey()} type="password"/>
            <button className="btn btn-primary btn-sm" onClick={saveKey} disabled={!keyDraft.trim()}>Activate</button>
          </div>
        </div>
      )}

      <div className="panel" style={{flex:1,display:'flex',flexDirection:'column',minHeight:0}}>
        <div className="quick-btns">
          {quickQuestions.map(q=><button key={q} className="qbtn" onClick={()=>sendMessage(q)}>{q}</button>)}
        </div>
        <div style={{height:1,background:'var(--b-dim)',margin:'12px 0'}}/>
        <div className="chat-messages">
          {messages.map((m,i)=>(
            <div key={i} className={`msg msg-${m.role}`}>
              {m.role==='ai'&&<div className="ai-avatar">🤖</div>}
              <div className="msg-bubble" style={{whiteSpace:'pre-wrap'}}>{m.content}</div>
              <div className="msg-meta">{m.role==='ai'?'IndustrialShield AI':'You'} · {new Date(m.timestamp).toLocaleTimeString()}</div>
            </div>
          ))}
          {loading&&(
            <div className="msg msg-ai">
              <div className="ai-avatar">🤖</div>
              <div className="typing"><span/><span/><span/></div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
        <div className="chat-footer">
          <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)}
            placeholder="Ask about anomalies, maintenance, safety protocols..."
            onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&sendMessage()}
            disabled={loading}/>
          <button className="chat-send" onClick={()=>sendMessage()} disabled={loading||!input.trim()}>
            {loading?<span className="loading-spin"/>:'➤'}
          </button>
        </div>
      </div>
    </div>
  );
}

function AdminPage({user,addToast}) {
  const [retraining,setRetraining]=useState(false);
  const [modelInfo,setModelInfo]=useState({type:'IsolationForest',estimators:80,sampleSize:256,contamination:'5%',status:'Ready',trainedOn:`${600} samples`});
  const [users,setUsers]=useState(getUsers());

  const retrain=()=>{
    setRetraining(true);
    const history=getHistory();
    setTimeout(()=>{
      const m=new IsolationForest(80,256,0.05);
      const baseline=generateBaseline(500);
      const extra=history.slice(0,200).map(h=>[h.temperature,h.pressure,h.vibration]);
      m.fit([...baseline,...extra]);
      setModelInfo(i=>({...i,trainedOn:`${baseline.length+extra.length} samples`,status:'Ready',lastRetrain:new Date().toLocaleString()}));
      setRetraining(false);
      addToast('✅ Model Retrained',`Used ${baseline.length+extra.length} samples`,'safe');
    },1800);
  };

  return (
    <div className="page">
      <div className="page-title">🔐 Admin Panel</div>
      <div className="page-sub">Model management, user administration, system configuration</div>
      <div className="grid2">
        <div>
          <div className="panel" style={{marginBottom:16}}>
            <div className="panel-title"><span className="panel-title-icon">🧠</span>ML Model Status</div>
            <div style={{marginBottom:16}}>
              <span className="model-badge">✅ {modelInfo.status}</span>
            </div>
            <div className="info-grid">
              {[['Algorithm',modelInfo.type],['Estimators',modelInfo.estimators],['Sample Size',modelInfo.sampleSize],['Contamination',modelInfo.contamination],['Trained On',modelInfo.trainedOn],['Last Retrain',modelInfo.lastRetrain||'Session start']].map(([k,v])=>(
                <div key={k} className="info-item"><div className="info-k">{k}</div><div className="info-v">{v}</div></div>
              ))}
            </div>
            <div style={{marginTop:16}}>
              <button className="btn btn-primary btn-sm" onClick={retrain} disabled={retraining}>
                {retraining?<><span className="loading-spin"/> Retraining...</>:'🔄 Retrain Model'}
              </button>
            </div>
          </div>
          <div className="panel">
            <div className="panel-title"><span className="panel-title-icon">⚙️</span>System Config</div>
            {[
              ['Backend URL','http://localhost:5000'],
              ['Database','SQLite (localStorage fallback)'],
              ['Auth Mode','Bearer Token'],
              ['Version','v3.0.0'],
              ['Environment','Browser/Frontend'],
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--b-dim)'}}>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--td)'}}>{k}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--ts)'}}>{v}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="panel">
          <div className="panel-title"><span className="panel-title-icon">👥</span>User Management</div>
          <div className="tbl-scroll">
            <table className="htable">
              <thead><tr><th>USER</th><th>ROLE</th><th>ID</th></tr></thead>
              <tbody>
                {users.map(u=>(
                  <tr key={u.id}>
                    <td style={{color:'var(--tp)'}}>{u.username}</td>
                    <td><span className={`tag ${u.role==='Admin'?'tag-critical':'tag-safe'}`}>{u.role}</span></td>
                    <td style={{color:'var(--td)'}}>{u.id}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:16,padding:'14px',background:'var(--deep)',borderRadius:8,fontFamily:'var(--mono)',fontSize:11,color:'var(--td)'}}>
            {users.length} users registered · Admin privileges required for model retraining
          </div>
        </div>
      </div>
    </div>
  );
}
